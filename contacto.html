<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Print & Wear</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">
            <a href="index.html"><strong>Print&Wear.</strong></a>
        </div>
        <nav class="main-nav">
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="nosotros.html">Sobre Nosotros</a></li>
                <li><a href="trabajos.html">Trabajos</a></li>
                <li><a href="contacto.html" class="active">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contacto-section">
            <div class="contacto-intro">
                <h1>Cuéntanos tu idea</h1>
                <p>¿Tienes un proyecto en mente o necesitas un presupuesto para tus camisetas? Escríbenos y te responderemos en menos de 24 horas.</p>
            </div>

            <form class="contacto-form" action="#" method="POST">
                <div class="form-group">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="hola@tuempresa.com" required>
                </div>

                <div class="form-group">
                    <label for="mensaje">¿En qué podemos ayudarte?</label>
                    <textarea id="mensaje" name="mensaje" rows="6" placeholder="Cuéntanos cuántas prendas necesitas, colores, diseño..." required></textarea>
                </div>

                <button type="submit" class="btn-submit">Enviar mensaje</button>
            </form>
        </section>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Print & Wear. Todos los derechos reservados.</p>
    </footer>
    
</body>
</html>
